description = "Scan a URL for AI agent-readability (Vercel spec, llms.txt, agent manifests)."
prompt = """Run the Agent Ready scanner on the URL the user provided and summarize the results.

!{npx -y agent-ready-scanner@latest scan {{args}} --json --no-color}

From the JSON above, report:
- The Vercel readability score (0-100) and its rating.
- The llms.txt score (0-100).
- The accessibility score (0-100) if present — a separate WCAG 2.2 / layout-stability sub-score.
- Pages scanned vs discovered.
- Every check that did NOT pass, with its message and the fix guidance (howToFix).
- The shareable report link if one is present.

This command works with no API key on the free anonymous tier (3 scans per 30 days per IP, 25-page
depth). If the output says the anonymous quota is exhausted (quota_exhausted / 429), tell the user
they can wait for the reset date shown, or get a Pro API key (250-page scans, higher volume, scan
history) at <https://agent-ready.dev/dashboard/api-keys> — set it with `gemini extensions config
agent-ready` or export AGENT_READY_API_KEY in the shell. The `ask` command is public and needs no
key."""
